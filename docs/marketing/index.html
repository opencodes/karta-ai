<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karta | Your Autonomous Life Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0A192F;
            --text-color: #8892B0;
            --heading-color: #CCD6F6;
            --accent-color: #64FFDA;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 20px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .logo span {
            color: var(--heading-color);
        }

        h1 {
            font-size: 2.5rem;
            color: var(--heading-color);
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .waitlist-form {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type="email"] {
            padding: 15px 25px;
            border-radius: 5px;
            border: 1px solid var(--accent-color);
            background: transparent;
            color: white;
            width: 300px;
            outline: none;
        }

        button {
            padding: 15px 30px;
            background-color: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }

        .features {
            margin-top: 60px;
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .feature-item {
            color: var(--accent-color);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            input[type="email"] {
                width: 100%;
            }

            .features {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">KARTA<span>.AI</span></div>
        <h1>The Doer for Your Digital Life.</h1>
        <p>
            An autonomous personal intelligence agent managing your <b>Finances, Events, and Connections</b> so you can
            focus on what matters.
        </p>

        <div class="waitlist-form">
            <input type="email" placeholder="Enter your email for early access" required>
            <button type="submit">Join the Waitlist</button>
        </div>

        <div class="features">
            <div class="feature-item">💰 Finance</div>
            <div class="feature-item">📅 Events</div>
            <div class="feature-item">🤝 Contacts</div>
            <div class="feature-item">✅ Tasks</div>
        </div>
    </div>

</body>

</html>
